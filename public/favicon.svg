<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Gradient border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#border)" stroke-width="6" opacity="0.8"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#border)" stroke-width="1" opacity="0.2"/>
  <!-- JL Text -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="220" fill="url(#text)" filter="url(#textGlow)" letter-spacing="-10">JL</text>
  <!-- Code brackets -->
  <text x="256" y="400" text-anchor="middle" font-family="monospace" font-weight="400" font-size="48" fill="url(#text)" opacity="0.5">&lt;  /&gt;</text>
</svg>
